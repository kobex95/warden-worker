<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden - 密码管理器</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            word-break: break-word;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Vault styles */
        .vault-container {
            max-width: 800px;
        }

        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .vault-header h2 {
            font-size: 24px;
            color: #333;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #e1e8ed;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #d1d8dd;
        }

        .vault-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .vault-item {
            background: #f8f9fa;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vault-item:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .vault-item h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .vault-item p {
            font-size: 14px;
            color: #666;
        }

        .empty-vault {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm">
            <div class="logo">
                <h1>🔐 Warden</h1>
                <p>安全的密码管理器</p>
            </div>

            <div id="loginError" class="error hidden"></div>

            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginEmail">邮箱</label>
                    <input type="email" id="loginEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">主密码</label>
                    <input type="password" id="loginPassword" required placeholder="输入主密码">
                </div>
                <button type="submit" class="btn">登录</button>
            </form>

            <div class="toggle-form">
                还没有账号？<a onclick="showRegisterForm()">立即注册</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="logo">
                <h1>🔐 Warden</h1>
                <p>创建您的密码库</p>
            </div>

            <div id="registerError" class="error hidden"></div>
            <div id="registerSuccess" class="success hidden"></div>

            <form id="registerFormElement">
                <div class="form-group">
                    <label for="registerName">姓名（可选）</label>
                    <input type="text" id="registerName" placeholder="您的姓名">
                </div>
                <div class="form-group">
                    <label for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="registerPassword">主密码</label>
                    <input type="password" id="registerPassword" required placeholder="至少8个字符">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">确认密码</label>
                    <input type="password" id="registerConfirmPassword" required placeholder="再次输入密码">
                </div>
                <button type="submit" class="btn">注册</button>
                <button type="button" class="btn btn-secondary" onclick="showLoginForm()">返回登录</button>
            </form>
        </div>

        <!-- Vault View -->
        <div id="vaultView" class="hidden vault-container">
            <div class="vault-header">
                <h2>🔐 我的密码库</h2>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>

            <div id="vaultContent" class="vault-list">
                <!-- Vault items will be loaded here -->
            </div>

            <button class="btn" onclick="addNewItem()" style="margin-top: 20px;">+ 添加新密码</button>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://jxngfaycacjetpiqttwb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Nwca-b4HH9JFDInZgyrAuQ_C0wsGnhs';

        // 创建 Supabase 客户端
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const vaultView = document.getElementById('vaultView');
        const loginFormElement = document.getElementById('loginFormElement');
        const registerFormElement = document.getElementById('registerFormElement');

        // State
        let currentUser = null;

        // Show/Hide Forms
        function showLoginForm() {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            vaultView.classList.add('hidden');
        }

        function showRegisterForm() {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            vaultView.classList.add('hidden');
        }

        function showVault() {
            loginForm.classList.add('hidden');
            registerForm.classList.add('hidden');
            vaultView.classList.remove('hidden');
            loadVault();
        }

        // Helper function to show error
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        // Helper function to show success
        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // Simple hash function for demo (in production, use PBKDF2)
        async function simpleHash(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        // Register Handler
        registerFormElement.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            // Clear previous messages
            document.getElementById('registerError').classList.add('hidden');
            document.getElementById('registerSuccess').classList.add('hidden');

            // Validation
            if (password !== confirmPassword) {
                showError('registerError', '两次输入的密码不一致');
                return;
            }

            if (password.length < 8) {
                showError('registerError', '密码至少需要8个字符');
                return;
            }

            try {
                console.log('开始注册流程...');
                console.log('Supabase client:', supabase ? '已初始化' : '未初始化');

                // Hash the password
                const passwordHash = await simpleHash(password);
                const userId = crypto.randomUUID();
                const now = new Date().toISOString();

                console.log('Registering user:', email);
                console.log('User ID:', userId);
                console.log('Password hash:', passwordHash);

                // Insert user into Supabase
                const { data, error } = await supabaseClient
                    .from('users')
                    .insert({
                        id: userId,
                        name: name || null,
                        email: email.toLowerCase(),
                        email_verified: true,
                        master_password_hash: passwordHash,
                        master_password_hint: null,
                        key: 'demo-key-' + Date.now(),
                        private_key: 'demo-private-key-' + Date.now(),
                        public_key: 'demo-public-key-' + Date.now(),
                        kdf_type: 0,
                        kdf_iterations: 600000,
                        security_stamp: crypto.randomUUID(),
                        created_at: now,
                        updated_at: now
                    })
                    .select();

                console.log('Insert response:', { data, error });

                if (error) {
                    console.error('Registration error:', error);
                    console.error('Error details:', error.code, error.message, error.hint);
                    showError('registerError', '注册失败：' + error.message);
                } else {
                    console.log('Registration success:', data);
                    showSuccess('registerSuccess', '注册成功！请登录');
                    setTimeout(() => {
                        showLoginForm();
                    }, 2000);
                }
            } catch (error) {
                console.error('Register error:', error);
                console.error('Error stack:', error.stack);
                showError('registerError', '网络错误：' + error.message);
            }
        });

        // Login Handler
        loginFormElement.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            document.getElementById('loginError').classList.add('hidden');

            try {
                // Hash the password
                const passwordHash = await simpleHash(password);

                console.log('Logging in:', email);

                // Query user from Supabase
                const { data: user, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email.toLowerCase())
                    .eq('master_password_hash', passwordHash)
                    .single();

                if (error || !user) {
                    console.error('Login error:', error);
                    showError('loginError', '邮箱或密码错误');
                } else {
                    console.log('Login success:', user);
                    currentUser = user;
                    showVault();
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('loginError', '网络错误：' + error.message);
            }
        });

        // Load Vault
        async function loadVault() {
            const vaultContent = document.getElementById('vaultContent');
            vaultContent.innerHTML = '<div class="empty-vault">加载中...</div>';

            try {
                console.log('Loading vault for user:', currentUser.id);

                // Fetch ciphers
                const { data: ciphers, error: ciphersError } = await supabaseClient
                    .from('ciphers')
                    .select('*')
                    .eq('user_id', currentUser.id);

                // Fetch folders
                const { data: folders, error: foldersError } = await supabaseClient
                    .from('folders')
                    .select('*')
                    .eq('user_id', currentUser.id);

                if (ciphersError || foldersError) {
                    console.error('Load vault error:', ciphersError || foldersError);
                    vaultContent.innerHTML = '<div class="empty-vault">加载失败，请刷新页面</div>';
                } else {
                    displayVault({ Ciphers: ciphers || [], Folders: folders || [] });
                }
            } catch (error) {
                console.error('Load vault error:', error);
                vaultContent.innerHTML = '<div class="empty-vault">加载失败，请刷新页面</div>';
            }
        }

        // Display Vault
        function displayVault(data) {
            const vaultContent = document.getElementById('vaultContent');

            if (!data.Ciphers || data.Ciphers.length === 0) {
                vaultContent.innerHTML = `
                    <div class="empty-vault">
                        <p>📭 密码库为空</p>
                        <p style="margin-top: 8px; font-size: 14px;">点击下方按钮添加您的第一个密码</p>
                    </div>
                `;
                return;
            }

            vaultContent.innerHTML = data.Ciphers.map(cipher => {
                const cipherData = typeof cipher.data === 'string' ? JSON.parse(cipher.data) : cipher.data;
                return `
                    <div class="vault-item" onclick="viewCipher('${cipher.id}')">
                        <h3>${cipherData.name || '未命名'}</h3>
                        <p>${cipherData.login?.username || '无用户名'}</p>
                    </div>
                `;
            }).join('');
        }

        // View Cipher
        function viewCipher(id) {
            alert('查看密码详情功能开发中...');
        }

        // Add New Item
        async function addNewItem() {
            const name = prompt('输入密码项名称：');
            if (!name) return;

            const username = prompt('输入用户名：');
            const password = prompt('输入密码：');

            if (!username || !password) {
                alert('用户名和密码不能为空');
                return;
            }

            try {
                const now = new Date().toISOString();
                const cipherId = crypto.randomUUID();

                const cipherData = {
                    name: name,
                    notes: null,
                    login: { username: username, password: password },
                    card: null,
                    identity: null,
                    secureNote: null,
                    fields: null,
                    passwordHistory: null,
                    reprompt: null
                };

                const { error } = await supabaseClient
                    .from('ciphers')
                    .insert({
                        id: cipherId,
                        user_id: currentUser.id,
                        organization_id: null,
                        type: 1,
                        data: JSON.stringify(cipherData),
                        favorite: false,
                        folder_id: null,
                        deleted_at: null,
                        created_at: now,
                        updated_at: now
                    });

                if (error) {
                    console.error('Add cipher error:', error);
                    alert('添加失败：' + error.message);
                } else {
                    alert('添加成功！');
                    loadVault();
                }
            } catch (error) {
                console.error('Add cipher error:', error);
                alert('添加失败：' + error.message);
            }
        }

        // Logout
        function logout() {
            currentUser = null;
            showLoginForm();
        }

        // Initialize
        showLoginForm();

        // Test Supabase connection
        (async () => {
            try {
                const { data, error } = await supabaseClient.from('users').select('count').limit(1);
                if (error) {
                    console.error('Supabase connection error:', error);
                } else {
                    console.log('Supabase connected successfully');
                }
            } catch (error) {
                console.error('Supabase connection error:', error);
            }
        })();
    </script>
</body>
</html>
