<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden - 密码管理器</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            word-break: break-word;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Vault styles */
        .vault-container {
            max-width: 800px;
        }

        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .vault-header h2 {
            font-size: 24px;
            color: #333;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #e1e8ed;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #d1d8dd;
        }

        .vault-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .vault-item {
            background: #f8f9fa;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vault-item:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .vault-item h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .vault-item p {
            font-size: 14px;
            color: #666;
        }

        .empty-vault {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* Modal styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 20px;
            color: #333;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .close-modal:hover {
            color: #333;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e1e8ed;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 500;
            color: #666;
            flex: 1;
        }

        .detail-value {
            color: #333;
            flex: 2;
            text-align: right;
            word-break: break-all;
        }

        .copy-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
            padding: 4px 8px;
        }

        .copy-btn:hover {
            color: #764ba2;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
        }

        /* Search styles */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Password Generator */
        .password-display {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 18px;
            word-break: break-all;
        }

        .generator-controls {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }

        .generator-controls label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .generator-controls input[type="range"] {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm">
            <div class="logo">
                <h1>🔐 Warden</h1>
                <p>安全的密码管理器</p>
            </div>

            <div id="loginError" class="error hidden"></div>

            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginEmail">邮箱</label>
                    <input type="email" id="loginEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">主密码</label>
                    <input type="password" id="loginPassword" required placeholder="输入主密码">
                </div>
                <button type="submit" class="btn">登录</button>
            </form>

            <div class="toggle-form">
                还没有账号？<a onclick="showRegisterForm()">立即注册</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="logo">
                <h1>🔐 Warden</h1>
                <p>创建您的密码库</p>
            </div>

            <div id="registerError" class="error hidden"></div>
            <div id="registerSuccess" class="success hidden"></div>

            <form id="registerFormElement">
                <div class="form-group">
                    <label for="registerName">姓名（可选）</label>
                    <input type="text" id="registerName" placeholder="您的姓名">
                </div>
                <div class="form-group">
                    <label for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="registerPassword">主密码</label>
                    <input type="password" id="registerPassword" required placeholder="至少8个字符">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">确认密码</label>
                    <input type="password" id="registerConfirmPassword" required placeholder="再次输入密码">
                </div>
                <button type="submit" class="btn">注册</button>
                <button type="button" class="btn btn-secondary" onclick="showLoginForm()">返回登录</button>
            </form>
        </div>

        <!-- Vault View -->
        <div id="vaultView" class="hidden vault-container">
            <div class="vault-header">
                <h2>🔐 我的密码库</h2>
                <div>
                    <button class="logout-btn" onclick="showFolders()" style="margin-right: 8px;">📁 文件夹</button>
                    <button class="logout-btn" onclick="logout()">退出</button>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索密码项..." oninput="searchVault()">
            </div>

            <div id="vaultContent" class="vault-list">
                <!-- Vault items will be loaded here -->
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" onclick="showAddItemModal()">+ 添加新密码</button>
                <button class="btn btn-secondary" onclick="showPasswordGenerator()">🎲 生成密码</button>
            </div>
        </div>

        <!-- Password Detail Modal -->
        <div id="detailModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">密码详情</h3>
                    <button class="close-modal" onclick="closeModal()">&times;</button>
                </div>
                <div id="modalContent"></div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="editCipher()">编辑</button>
                    <button class="btn btn-secondary" onclick="toggleFavorite()">⭐ 收藏</button>
                    <button class="btn btn-secondary" onclick="deleteCipher()">删除</button>
                    <button class="btn" onclick="closeModal()">关闭</button>
                </div>
            </div>
        </div>

        <!-- Add/Edit Password Modal -->
        <div id="itemModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="itemModalTitle">添加密码</h3>
                    <button class="close-modal" onclick="closeItemModal()">&times;</button>
                </div>
                <div id="itemModalContent">
                    <div class="form-group">
                        <label for="itemName">名称 *</label>
                        <input type="text" id="itemName" required placeholder="例如：Google 账号">
                    </div>
                    <div class="form-group">
                        <label for="itemUsername">用户名 *</label>
                        <input type="text" id="itemUsername" required placeholder="用户名或邮箱">
                    </div>
                    <div class="form-group">
                        <label for="itemPassword">密码 *</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="itemPassword" required placeholder="输入密码">
                            <button type="button" class="btn btn-secondary" onclick="generateForInput()">生成</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="itemNotes">备注</label>
                        <input type="text" id="itemNotes" placeholder="可选备注信息">
                    </div>
                    <div class="form-group">
                        <label for="itemFolder">文件夹</label>
                        <select id="itemFolder" style="width: 100%; padding: 12px; border: 2px solid #e1e8ed; border-radius: 8px;">
                            <option value="">无文件夹</option>
                        </select>
                    </div>
                    <div id="passwordStrength" style="margin-bottom: 20px; font-size: 14px;"></div>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="saveCipher()">保存</button>
                    <button class="btn btn-secondary" onclick="closeItemModal()">取消</button>
                </div>
            </div>
        </div>

        <!-- Password Generator Modal -->
        <div id="generatorModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>密码生成器</h3>
                    <button class="close-modal" onclick="closeGenerator()">&times;</button>
                </div>
                <div id="generatedPassword" class="password-display">点击生成</div>
                <div class="generator-controls">
                    <label>
                        长度: <span id="lengthValue">16</span>
                        <input type="range" id="passwordLength" min="8" max="64" value="16" oninput="updateLengthValue()">
                    </label>
                    <label>
                        <input type="checkbox" id="useUppercase" checked> 大写字母 (A-Z)
                    </label>
                    <label>
                        <input type="checkbox" id="useLowercase" checked> 小写字母 (a-z)
                    </label>
                    <label>
                        <input type="checkbox" id="useNumbers" checked> 数字 (0-9)
                    </label>
                    <label>
                        <input type="checkbox" id="useSymbols" checked> 特殊字符 (!@#$%)
                    </label>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="generatePassword()">生成密码</button>
                    <button class="btn btn-secondary" onclick="copyGeneratedPassword()">复制</button>
                </div>
            </div>
        </div>

        <!-- Folders Modal -->
        <div id="foldersModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>📁 文件夹管理</h3>
                    <button class="close-modal" onclick="closeFolders()">&times;</button>
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="newFolderName">新建文件夹</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="newFolderName" placeholder="文件夹名称">
                        <button class="btn" onclick="createFolder()">创建</button>
                    </div>
                </div>
                <div id="foldersContent" class="vault-list">
                    <div class="empty-vault">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://jxngfaycacjetpiqttwb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Nwca-b4HH9JFDInZgyrAuQ_C0wsGnhs';

        // 创建 Supabase 客户端
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const vaultView = document.getElementById('vaultView');
        const loginFormElement = document.getElementById('loginFormElement');
        const registerFormElement = document.getElementById('registerFormElement');

        // State
        let currentUser = null;
        let currentCipher = null;
        let allCiphers = [];
        let allFolders = [];
        let isEditing = false;

        // Show/Hide Forms
        function showLoginForm() {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            vaultView.classList.add('hidden');
        }

        function showRegisterForm() {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            vaultView.classList.add('hidden');
        }

        function showVault() {
            loginForm.classList.add('hidden');
            registerForm.classList.add('hidden');
            vaultView.classList.remove('hidden');
            loadVault();
        }

        // Helper function to show error
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        // Helper function to show success
        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // Simple hash function for demo (in production, use PBKDF2)
        async function simpleHash(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        // Register Handler
        registerFormElement.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            // Clear previous messages
            document.getElementById('registerError').classList.add('hidden');
            document.getElementById('registerSuccess').classList.add('hidden');

            // Validation
            if (password !== confirmPassword) {
                showError('registerError', '两次输入的密码不一致');
                return;
            }

            if (password.length < 8) {
                showError('registerError', '密码至少需要8个字符');
                return;
            }

            try {
                console.log('开始注册流程...');
                console.log('Supabase client:', supabase ? '已初始化' : '未初始化');

                // Hash the password
                const passwordHash = await simpleHash(password);
                const userId = crypto.randomUUID();
                const now = new Date().toISOString();

                console.log('Registering user:', email);
                console.log('User ID:', userId);
                console.log('Password hash:', passwordHash);

                // Insert user into Supabase
                const { data, error } = await supabaseClient
                    .from('users')
                    .insert({
                        id: userId,
                        name: name || null,
                        email: email.toLowerCase(),
                        email_verified: true,
                        master_password_hash: passwordHash,
                        master_password_hint: null,
                        key: 'demo-key-' + Date.now(),
                        private_key: 'demo-private-key-' + Date.now(),
                        public_key: 'demo-public-key-' + Date.now(),
                        kdf_type: 0,
                        kdf_iterations: 600000,
                        security_stamp: crypto.randomUUID(),
                        created_at: now,
                        updated_at: now
                    })
                    .select();

                console.log('Insert response:', { data, error });

                if (error) {
                    console.error('Registration error:', error);
                    console.error('Error details:', error.code, error.message, error.hint);
                    showError('registerError', '注册失败：' + error.message);
                } else {
                    console.log('Registration success:', data);
                    showSuccess('registerSuccess', '注册成功！请登录');
                    setTimeout(() => {
                        showLoginForm();
                    }, 2000);
                }
            } catch (error) {
                console.error('Register error:', error);
                console.error('Error stack:', error.stack);
                showError('registerError', '网络错误：' + error.message);
            }
        });

        // Login Handler
        loginFormElement.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            document.getElementById('loginError').classList.add('hidden');

            try {
                // Hash the password
                const passwordHash = await simpleHash(password);

                console.log('Logging in:', email);

                // Query user from Supabase
                const { data: user, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email.toLowerCase())
                    .eq('master_password_hash', passwordHash)
                    .single();

                if (error || !user) {
                    console.error('Login error:', error);
                    showError('loginError', '邮箱或密码错误');
                } else {
                    console.log('Login success:', user);
                    currentUser = user;
                    showVault();
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('loginError', '网络错误：' + error.message);
            }
        });

        // Load Vault
        async function loadVault() {
            const vaultContent = document.getElementById('vaultContent');
            vaultContent.innerHTML = '<div class="empty-vault">加载中...</div>';

            try {
                console.log('Loading vault for user:', currentUser.id);

                // Fetch ciphers
                const { data: ciphers, error: ciphersError } = await supabaseClient
                    .from('ciphers')
                    .select('*')
                    .eq('user_id', currentUser.id);

                // Fetch folders
                const { data: folders, error: foldersError } = await supabaseClient
                    .from('folders')
                    .select('*')
                    .eq('user_id', currentUser.id);

                if (ciphersError || foldersError) {
                    console.error('Load vault error:', ciphersError || foldersError);
                    vaultContent.innerHTML = '<div class="empty-vault">加载失败，请刷新页面</div>';
                } else {
                    allFolders = folders || [];
                    displayVault({ Ciphers: ciphers || [], Folders: allFolders });
                }
            } catch (error) {
                console.error('Load vault error:', error);
                vaultContent.innerHTML = '<div class="empty-vault">加载失败，请刷新页面</div>';
            }
        }

        // Display Vault
        function displayVault(data) {
            allCiphers = data.Ciphers || [];
            renderVault(allCiphers);
        }

        // Render Vault Items
        function renderVault(ciphers) {
            const vaultContent = document.getElementById('vaultContent');

            if (!ciphers || ciphers.length === 0) {
                vaultContent.innerHTML = `
                    <div class="empty-vault">
                        <p>📭 ${allCiphers.length === 0 ? '密码库为空' : '未找到匹配项'}</p>
                        <p style="margin-top: 8px; font-size: 14px;">${allCiphers.length === 0 ? '点击下方按钮添加您的第一个密码' : '尝试其他搜索词'}</p>
                    </div>
                `;
                return;
            }

            vaultContent.innerHTML = ciphers.map(cipher => {
                const cipherData = typeof cipher.data === 'string' ? JSON.parse(cipher.data) : cipher.data;
                const folder = cipher.folder_id ? allFolders.find(f => f.id === cipher.folder_id) : null;

                return `
                    <div class="vault-item" onclick="viewCipher('${cipher.id}')">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div style="flex: 1;">
                                <h3 style="display: flex; align-items: center; gap: 8px;">
                                    ${cipher.favorite ? '⭐' : ''} ${cipherData.name || '未命名'}
                                </h3>
                                <p>${cipherData.login?.username || '无用户名'}</p>
                                ${folder ? `<p style="font-size: 12px; color: #999;">📁 ${folder.name}</p>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Search Vault
        function searchVault() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                renderVault(allCiphers);
                return;
            }

            const filtered = allCiphers.filter(cipher => {
                const cipherData = typeof cipher.data === 'string' ? JSON.parse(cipher.data) : cipher.data;
                const name = (cipherData.name || '').toLowerCase();
                const username = (cipherData.login?.username || '').toLowerCase();
                return name.includes(searchTerm) || username.includes(searchTerm);
            });

            renderVault(filtered);
        }

        // View Cipher
        function viewCipher(id) {
            const cipher = allCiphers.find(c => c.id === id);
            if (!cipher) return;

            currentCipher = cipher;
            const cipherData = typeof cipher.data === 'string' ? JSON.parse(cipher.data) : cipher.data;

            document.getElementById('modalTitle').textContent = cipherData.name || '未命名';
            document.getElementById('modalContent').innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">用户名</div>
                    <div class="detail-value">
                        ${cipherData.login?.username || '-'}
                        <button class="copy-btn" onclick="copyToClipboard('${cipherData.login?.username || ''}')">复制</button>
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">密码</div>
                    <div class="detail-value">
                        <span id="cipherPassword">••••••••</span>
                        <button class="copy-btn" onclick="togglePasswordVisibility()">显示</button>
                        <button class="copy-btn" onclick="copyToClipboard('${cipherData.login?.password || ''}')">复制</button>
                    </div>
                </div>
                ${cipherData.notes ? `
                <div class="detail-row">
                    <div class="detail-label">备注</div>
                    <div class="detail-value">${cipherData.notes}</div>
                </div>
                ` : ''}
                <div class="detail-row">
                    <div class="detail-label">创建时间</div>
                    <div class="detail-value">${new Date(cipher.created_at).toLocaleString('zh-CN')}</div>
                </div>
            `;

            document.getElementById('detailModal').classList.remove('hidden');
        }

        // Toggle Password Visibility
        function togglePasswordVisibility() {
            const passwordSpan = document.getElementById('cipherPassword');
            const cipherData = typeof currentCipher.data === 'string' ? JSON.parse(currentCipher.data) : currentCipher.data;
            const password = cipherData.login?.password || '';

            if (passwordSpan.textContent === '••••••••') {
                passwordSpan.textContent = password;
            } else {
                passwordSpan.textContent = '••••••••';
            }
        }

        // Copy to Clipboard
        async function copyToClipboard(text) {
            if (!text) {
                alert('没有可复制的内容');
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                alert('已复制到剪贴板！');
            } catch (error) {
                alert('复制失败，请手动复制');
            }
        }

        // Close Modal
        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            currentCipher = null;
        }

        // Delete Cipher
        async function deleteCipher() {
            if (!currentCipher) return;

            if (!confirm('确定要删除这个密码项吗？此操作不可恢复。')) {
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('ciphers')
                    .delete()
                    .eq('id', currentCipher.id);

                if (error) {
                    alert('删除失败：' + error.message);
                } else {
                    alert('删除成功！');
                    closeModal();
                    loadVault();
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        // Show Password Generator
        function showPasswordGenerator() {
            document.getElementById('generatorModal').classList.remove('hidden');
            generatePassword();
        }

        // Close Generator
        function closeGenerator() {
            document.getElementById('generatorModal').classList.add('hidden');
        }

        // Update Length Value Display
        function updateLengthValue() {
            document.getElementById('lengthValue').textContent = document.getElementById('passwordLength').value;
        }

        // Generate Password
        function generatePassword() {
            const length = parseInt(document.getElementById('passwordLength').value);
            const useUppercase = document.getElementById('useUppercase').checked;
            const useLowercase = document.getElementById('useLowercase').checked;
            const useNumbers = document.getElementById('useNumbers').checked;
            const useSymbols = document.getElementById('useSymbols').checked;

            let chars = '';
            if (useUppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (!chars) {
                document.getElementById('generatedPassword').textContent = '请至少选择一种字符类型';
                return;
            }

            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            for (let i = 0; i < length; i++) {
                password += chars[array[i] % chars.length];
            }

            document.getElementById('generatedPassword').textContent = password;
        }

        // Copy Generated Password
        async function copyGeneratedPassword() {
            const password = document.getElementById('generatedPassword').textContent;
            if (password === '点击生成' || password === '请至少选择一种字符类型') {
                alert('请先生成密码');
                return;
            }
            await copyToClipboard(password);
        }

        // Show Add Item Modal
        function showAddItemModal() {
            isEditing = false;
            document.getElementById('itemModalTitle').textContent = '添加密码';
            document.getElementById('itemName').value = '';
            document.getElementById('itemUsername').value = '';
            document.getElementById('itemPassword').value = '';
            document.getElementById('itemNotes').value = '';
            document.getElementById('passwordStrength').textContent = '';
            loadFolderOptions();
            document.getElementById('itemModal').classList.remove('hidden');
        }

        // Close Item Modal
        function closeItemModal() {
            document.getElementById('itemModal').classList.add('hidden');
            isEditing = false;
        }

        // Load Folder Options
        function loadFolderOptions() {
            const select = document.getElementById('itemFolder');
            select.innerHTML = '<option value="">无文件夹</option>';
            allFolders.forEach(folder => {
                const option = document.createElement('option');
                option.value = folder.id;
                option.textContent = folder.name;
                select.appendChild(option);
            });
        }

        // Password Strength Checker
        function checkPasswordStrength(password) {
            if (!password) return '';

            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            const levels = ['非常弱', '弱', '一般', '强', '很强', '非常强'];
            const colors = ['#c33', '#c66', '#cc3', '#3c3', '#3cc', '#33c'];
            const index = Math.min(strength - 1, 5);

            return `<span style="color: ${colors[index]}; font-weight: 600;">密码强度: ${levels[index] || '未评级'}</span>`;
        }

        // Save Cipher (Add or Edit)
        async function saveCipher() {
            const name = document.getElementById('itemName').value.trim();
            const username = document.getElementById('itemUsername').value.trim();
            const password = document.getElementById('itemPassword').value.trim();
            const notes = document.getElementById('itemNotes').value.trim() || null;
            const folderId = document.getElementById('itemFolder').value || null;

            if (!name || !username || !password) {
                alert('名称、用户名和密码不能为空');
                return;
            }

            try {
                const now = new Date().toISOString();
                const cipherData = {
                    name: name,
                    notes: notes,
                    login: { username: username, password: password },
                    card: null,
                    identity: null,
                    secureNote: null,
                    fields: null,
                    passwordHistory: null,
                    reprompt: null
                };

                if (isEditing && currentCipher) {
                    // Update existing cipher
                    const { error } = await supabaseClient
                        .from('ciphers')
                        .update({
                            data: JSON.stringify(cipherData),
                            folder_id: folderId,
                            updated_at: now
                        })
                        .eq('id', currentCipher.id);

                    if (error) {
                        alert('更新失败：' + error.message);
                    } else {
                        alert('更新成功！');
                        closeItemModal();
                        closeModal();
                        loadVault();
                    }
                } else {
                    // Create new cipher
                    const cipherId = crypto.randomUUID();
                    const { error } = await supabaseClient
                        .from('ciphers')
                        .insert({
                            id: cipherId,
                            user_id: currentUser.id,
                            organization_id: null,
                            type: 1,
                            data: JSON.stringify(cipherData),
                            favorite: false,
                            folder_id: folderId,
                            deleted_at: null,
                            created_at: now,
                            updated_at: now
                        });

                    if (error) {
                        alert('添加失败：' + error.message);
                    } else {
                        alert('添加成功！');
                        closeItemModal();
                        loadVault();
                    }
                }
            } catch (error) {
                alert('操作失败：' + error.message);
            }
        }

        // Edit Cipher
        function editCipher() {
            if (!currentCipher) return;

            closeModal();
            isEditing = true;
            document.getElementById('itemModalTitle').textContent = '编辑密码';

            const cipherData = typeof currentCipher.data === 'string' ? JSON.parse(currentCipher.data) : currentCipher.data;

            document.getElementById('itemName').value = cipherData.name || '';
            document.getElementById('itemUsername').value = cipherData.login?.username || '';
            document.getElementById('itemPassword').value = cipherData.login?.password || '';
            document.getElementById('itemNotes').value = cipherData.notes || '';
            document.getElementById('passwordStrength').textContent = checkPasswordStrength(cipherData.login?.password || '');

            loadFolderOptions();
            document.getElementById('itemFolder').value = currentCipher.folder_id || '';

            document.getElementById('itemModal').classList.remove('hidden');
        }

        // Toggle Favorite
        async function toggleFavorite() {
            if (!currentCipher) return;

            try {
                const newFavorite = !currentCipher.favorite;
                const { error } = await supabaseClient
                    .from('ciphers')
                    .update({ favorite: newFavorite })
                    .eq('id', currentCipher.id);

                if (error) {
                    alert('操作失败：' + error.message);
                } else {
                    alert(newFavorite ? '已添加到收藏' : '已取消收藏');
                    currentCipher.favorite = newFavorite;
                    closeModal();
                    loadVault();
                }
            } catch (error) {
                alert('操作失败：' + error.message);
            }
        }

        // Generate Password for Input
        function generateForInput() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let password = '';
            const array = new Uint32Array(16);
            crypto.getRandomValues(array);
            for (let i = 0; i < 16; i++) {
                password += chars[array[i] % chars.length];
            }
            document.getElementById('itemPassword').value = password;
            document.getElementById('passwordStrength').textContent = checkPasswordStrength(password);
        }

        // Add password strength listener
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('itemPassword');
            if (passwordInput) {
                passwordInput.addEventListener('input', (e) => {
                    document.getElementById('passwordStrength').textContent = checkPasswordStrength(e.target.value);
                });
            }
        });

        // Logout
        function logout() {
            currentUser = null;
            showLoginForm();
        }

        // Show Folders Modal
        async function showFolders() {
            document.getElementById('foldersModal').classList.remove('hidden');
            await loadFolders();
        }

        // Close Folders Modal
        function closeFolders() {
            document.getElementById('foldersModal').classList.add('hidden');
        }

        // Load Folders
        async function loadFolders() {
            const foldersContent = document.getElementById('foldersContent');
            foldersContent.innerHTML = '<div class="empty-vault">加载中...</div>';

            try {
                const { data: folders, error } = await supabaseClient
                    .from('folders')
                    .select('*')
                    .eq('user_id', currentUser.id);

                if (error) {
                    foldersContent.innerHTML = '<div class="empty-vault">加载失败</div>';
                } else {
                    allFolders = folders || [];
                    displayFolders();
                }
            } catch (error) {
                foldersContent.innerHTML = '<div class="empty-vault">加载失败</div>';
            }
        }

        // Display Folders
        function displayFolders() {
            const foldersContent = document.getElementById('foldersContent');

            if (!allFolders || allFolders.length === 0) {
                foldersContent.innerHTML = `
                    <div class="empty-vault">
                        <p>📭 暂无文件夹</p>
                        <p style="margin-top: 8px; font-size: 14px;">在上方创建新文件夹</p>
                    </div>
                `;
                return;
            }

            foldersContent.innerHTML = allFolders.map(folder => {
                const cipherCount = allCiphers.filter(c => c.folder_id === folder.id).length;
                return `
                    <div class="vault-item">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3>📁 ${folder.name}</h3>
                                <p>${cipherCount} 个密码项</p>
                            </div>
                            <button class="btn btn-secondary" onclick="deleteFolder('${folder.id}', '${folder.name}')" style="width: auto; padding: 8px 16px; margin: 0;">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Create Folder
        async function createFolder() {
            const name = document.getElementById('newFolderName').value.trim();

            if (!name) {
                alert('请输入文件夹名称');
                return;
            }

            try {
                const now = new Date().toISOString();
                const folderId = crypto.randomUUID();

                const { error } = await supabaseClient
                    .from('folders')
                    .insert({
                        id: folderId,
                        user_id: currentUser.id,
                        name: name,
                        created_at: now,
                        updated_at: now
                    });

                if (error) {
                    alert('创建失败：' + error.message);
                } else {
                    alert('创建成功！');
                    document.getElementById('newFolderName').value = '';
                    await loadFolders();
                }
            } catch (error) {
                alert('创建失败：' + error.message);
            }
        }

        // Delete Folder
        async function deleteFolder(folderId, folderName) {
            if (!confirm(`确定要删除文件夹 "${folderName}" 吗？文件夹内的密码将变为无分类。`)) {
                return;
            }

            try {
                // Update ciphers to remove folder_id
                const { error: updateError } = await supabaseClient
                    .from('ciphers')
                    .update({ folder_id: null })
                    .eq('folder_id', folderId);

                if (updateError) {
                    alert('更新密码失败：' + updateError.message);
                    return;
                }

                // Delete folder
                const { error } = await supabaseClient
                    .from('folders')
                    .delete()
                    .eq('id', folderId);

                if (error) {
                    alert('删除失败：' + error.message);
                } else {
                    alert('删除成功！');
                    await loadFolders();
                    loadVault();
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }

        // Initialize
        showLoginForm();

        // Test Supabase connection
        (async () => {
            try {
                const { data, error } = await supabaseClient.from('users').select('count').limit(1);
                if (error) {
                    console.error('Supabase connection error:', error);
                } else {
                    console.log('Supabase connected successfully');
                }
            } catch (error) {
                console.error('Supabase connection error:', error);
            }
        })();
    </script>
</body>
</html>
