<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden - 密码管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            word-break: break-word;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .vault-container {
            max-width: 800px;
        }

        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .vault-header h2 {
            font-size: 24px;
            color: #333;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #e1e8ed;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #d1d8dd;
        }

        .vault-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .vault-item {
            background: #f8f9fa;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vault-item:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .vault-item h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .vault-item p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm">
            <div class="logo">
                <h1>🔐 Warden</h1>
                <p>安全的密码管理器</p>
            </div>

            <div id="loginError" class="error hidden"></div>

            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginEmail">邮箱</label>
                    <input type="email" id="loginEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">主密码</label>
                    <input type="password" id="loginPassword" required placeholder="输入主密码">
                </div>
                <button type="submit" class="btn">登录</button>
            </form>

            <div class="toggle-form">
                还没有账号？<a onclick="showRegisterForm()">立即注册</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="hidden">
            <div class="logo">
                <h1>🔐 Warden</h1>
                <p>创建您的密码库</p>
            </div>

            <div id="registerError" class="error hidden"></div>
            <div id="registerSuccess" class="success hidden"></div>

            <form id="registerFormElement">
                <div class="form-group">
                    <label for="registerName">姓名（可选）</label>
                    <input type="text" id="registerName" placeholder="您的姓名">
                </div>
                <div class="form-group">
                    <label for="registerEmail">邮箱</label>
                    <input type="email" id="registerEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="registerPassword">主密码</label>
                    <input type="password" id="registerPassword" required placeholder="至少8个字符">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">确认密码</label>
                    <input type="password" id="registerConfirmPassword" required placeholder="再次输入密码">
                </div>
                <button type="submit" class="btn">注册</button>
                <button type="button" class="btn btn-secondary" onclick="showLoginForm()">返回登录</button>
            </form>
        </div>

        <!-- Vault View -->
        <div id="vaultView" class="hidden vault-container">
            <div class="vault-header">
                <h2>🔐 我的密码库</h2>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>

            <div id="vaultContent" class="vault-list">
                <!-- Vault items will be loaded here -->
            </div>

            <button class="btn" onclick="addNewItem()" style="margin-top: 20px;">+ 添加新密码</button>
        </div>
    </div>

    <script>
        // API Configuration - 使用相对路径
        const API_URL = window.location.origin;

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const vaultView = document.getElementById('vaultView');
        const loginFormElement = document.getElementById('loginFormElement');
        const registerFormElement = document.getElementById('registerFormElement');

        // State
        let accessToken = localStorage.getItem('access_token');
        let refreshToken = localStorage.getItem('refresh_token');

        // Show/Hide Forms
        function showLoginForm() {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            vaultView.classList.add('hidden');
        }

        function showRegisterForm() {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            vaultView.classList.add('hidden');
        }

        function showVault() {
            loginForm.classList.add('hidden');
            registerForm.classList.add('hidden');
            vaultView.classList.remove('hidden');
            loadVault();
        }

        // Helper function to show error
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.remove('hidden');
            console.error(message);
        }

        // Test API connection
        async function testApiConnection() {
            try {
                console.log('Testing API connection to:', API_URL + '/api/health');
                const response = await fetch(API_URL + '/api/health', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                console.log('Health check response:', response.status, response.statusText);
                const data = await response.json();
                console.log('Health check data:', data);
                return response.ok;
            } catch (error) {
                console.error('API connection test failed:', error);
                return false;
            }
        }

        // Register Handler
        registerFormElement.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');

            // Clear previous messages
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            // Validation
            if (password !== confirmPassword) {
                showError('registerError', '两次输入的密码不一致');
                return;
            }

            if (password.length < 8) {
                showError('registerError', '密码至少需要8个字符');
                return;
            }

            try {
                // Test API first
                const apiOk = await testApiConnection();
                if (!apiOk) {
                    showError('registerError', '无法连接到服务器，请检查网络或稍后重试');
                    return;
                }

                console.log('Registering user:', email);
                console.log('API URL:', API_URL + '/identity/accounts/register/finish');

                const registerData = {
                    name: name || null,
                    email: email,
                    masterPasswordHash: password,
                    masterPasswordHint: null,
                    userSymmetricKey: 'demo-key-' + Date.now(),
                    userAsymmetricKeys: {
                        publicKey: 'demo-public-key-' + Date.now(),
                        encryptedPrivateKey: 'demo-private-key-' + Date.now()
                    },
                    kdf: 0,
                    kdfIterations: 600000
                };

                console.log('Request payload:', registerData);

                const response = await fetch(API_URL + '/identity/accounts/register/finish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(registerData)
                });

                console.log('Register response status:', response.status);
                console.log('Register response ok:', response.ok);

                const data = await response.json();
                console.log('Register response data:', data);

                if (response.ok) {
                    successDiv.textContent = '注册成功！请登录';
                    successDiv.classList.remove('hidden');

                    setTimeout(() => {
                        showLoginForm();
                        successDiv.classList.add('hidden');
                    }, 2000);
                } else {
                    showError('registerError', data.error || '注册失败：' + response.statusText);
                }
            } catch (error) {
                console.error('Register error:', error);
                showError('registerError', '网络错误：' + error.message);
            }
        });

        // Login Handler
        loginFormElement.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            errorDiv.classList.add('hidden');

            try {
                console.log('Logging in:', email);

                const response = await fetch(API_URL + '/identity/connect/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        grant_type: 'password',
                        username: email,
                        password: password
                    })
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                    showVault();
                } else {
                    showError('loginError', data.error || '登录失败');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('loginError', '网络错误：' + error.message);
            }
        });

        // Load Vault
        async function loadVault() {
            const vaultContent = document.getElementById('vaultContent');

            try {
                const response = await fetch(API_URL + '/api/sync', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    displayVault(data);
                } else {
                    if (response.status === 401) {
                        await refreshAccessToken();
                        loadVault();
                    } else {
                        console.error('Sync error:', data);
                    }
                }
            } catch (error) {
                console.error('Load vault error:', error);
            }
        }

        // Display Vault
        function displayVault(data) {
            const vaultContent = document.getElementById('vaultContent');

            if (!data.Ciphers || data.Ciphers.length === 0) {
                vaultContent.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #666;">
                        <p>📭 密码库为空</p>
                        <p style="margin-top: 8px; font-size: 14px;">点击下方按钮添加您的第一个密码</p>
                    </div>
                `;
                return;
            }

            vaultContent.innerHTML = data.Ciphers.map(cipher => `
                <div class="vault-item" onclick="viewCipher('${cipher.id}')">
                    <h3>${cipher.data?.name || '未命名'}</h3>
                    <p>${cipher.data?.login?.username || '无用户名'}</p>
                </div>
            `).join('');
        }

        // View Cipher
        function viewCipher(id) {
            alert('查看密码详情功能开发中...');
        }

        // Add New Item
        function addNewItem() {
            alert('添加新密码功能开发中...');
        }

        // Refresh Access Token
        async function refreshAccessToken() {
            try {
                const response = await fetch(API_URL + '/identity/connect/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        grant_type: 'refresh_token',
                        refresh_token: refreshToken
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    accessToken = data.access_token;
                    refreshToken = data.refresh_token;
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Refresh token error:', error);
                logout();
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            accessToken = null;
            refreshToken = null;
            showLoginForm();
        }

        // Initialize
        if (accessToken) {
            showVault();
        } else {
            showLoginForm();
        }

        // Test API on load
        testApiConnection().then(ok => {
            if (!ok) {
                console.warn('API connection test failed - API functions may not be configured');
            }
        });
    </script>
</body>
</html>
